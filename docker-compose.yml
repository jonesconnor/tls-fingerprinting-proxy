services:

  proxy:
    build: ./proxy
    ports:
      - "8443:8443"
    volumes:
      - ./certs:/certs:ro
      - fingerprint-logs:/data/fingerprints
      - ./catalogue:/data/catalogue:ro
      - traffic-db:/data/traffic
    environment:
      CATALOGUE_PATH: "/data/catalogue/ai-sdk-fingerprints.json"
      LISTEN_HOST: "0.0.0.0"
      PROXY_PORT: "8443"
      HUMAN_BACKEND_HOST: "backend"
      HUMAN_BACKEND_PORT: "8080"
      AGENT_BACKEND_HOST: "agent"
      AGENT_BACKEND_PORT: "8001"
      CERT_FILE: "/certs/proxy.crt"
      KEY_FILE: "/certs/proxy.key"
      LOG_DIR: "/data/fingerprints"
      LOG_RETENTION_DAYS: "30"
      TRAFFIC_DB_PATH: "/data/traffic/traffic.db"
    depends_on:
      backend:
        condition: service_started
      agent:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8080"
    volumes:
      - traffic-db:/data/traffic:ro
    environment:
      BACKEND_PORT: "8080"
      TRAFFIC_DB_PATH: "/data/traffic/traffic.db"
    networks:
      - internal
    restart: unless-stopped

  agent:
    build: ./agent
    expose:
      - "8001"
    volumes:
      - ./catalogue:/data/catalogue:ro
      - traffic-db:/data/traffic:ro
    environment:
      AGENT_PORT: "8001"
      CATALOGUE_PATH: "/data/catalogue/ai-sdk-fingerprints.json"
      TRAFFIC_DB_PATH: "/data/traffic/traffic.db"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  fingerprint-logs:
  traffic-db:
