services:

  proxy:
    build: ./proxy
    ports:
      - "8443:8443"
    volumes:
      - ./certs:/certs:ro
    environment:
      LISTEN_HOST: "0.0.0.0"
      PROXY_PORT: "8443"
      BACKEND_HOST: "backend"
      BACKEND_PORT: "8080"
      CERT_FILE: "/certs/proxy.crt"
      KEY_FILE: "/certs/proxy.key"
    depends_on:
      backend:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      BACKEND_PORT: "8080"
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
