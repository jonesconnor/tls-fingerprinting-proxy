# docker-compose.prod.yml — Production stack configuration.
#
# Differences from docker-compose.yml (dev):
#   - Proxy binds port 443 instead of 8443
#   - Cert/key paths point to Let's Encrypt certs in certs/letsencrypt/
#   - DOMAIN must be set in the environment or passed via make up-prod
#
# Usage:
#   make provision-certs DOMAIN=yourhost.com EMAIL=you@example.com
#   make up-prod DOMAIN=yourhost.com
#
# Do not use this file directly with docker compose up — use the Makefile
# targets, which pass DOMAIN through correctly.

services:

  proxy:
    build: ./proxy
    ports:
      - "443:443"
    volumes:
      - ./certs/letsencrypt:/etc/letsencrypt:ro
      - fingerprint-logs:/data/fingerprints
    environment:
      LISTEN_HOST: "0.0.0.0"
      PROXY_PORT: "443"
      HUMAN_BACKEND_HOST: "backend"
      HUMAN_BACKEND_PORT: "8080"
      AGENT_BACKEND_HOST: "agent"
      AGENT_BACKEND_PORT: "8001"
      CERT_FILE: "/etc/letsencrypt/live/${DOMAIN}/fullchain.pem"
      KEY_FILE: "/etc/letsencrypt/live/${DOMAIN}/privkey.pem"
      LOG_DIR: "/data/fingerprints"
      LOG_RETENTION_DAYS: "7"
    depends_on:
      backend:
        condition: service_started
      agent:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      BACKEND_PORT: "8080"
    networks:
      - internal
    restart: unless-stopped

  agent:
    build: ./agent
    expose:
      - "8001"
    environment:
      AGENT_PORT: "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  fingerprint-logs:
